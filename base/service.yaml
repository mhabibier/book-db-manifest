# PostgreSQL Service for book-service database.

apiVersion: v1
kind: Service
metadata:
  name: book-postgres-headless
  namespace: book-postgres
  labels:
    app.kubernetes.io/name:      book-postgres
    app.kubernetes.io/component: database-headless
spec:
  type:      ClusterIP
  clusterIP: None
  selector:
    app: book-postgres
  ports:
    - name:       postgres
      port:       5432
      targetPort: postgres
      protocol:   TCP

---
# ClusterIP Service — used by book-service
apiVersion: v1
kind: Service
metadata:
  name: book-postgres
  namespace: book-postgres
  labels:
    app.kubernetes.io/name:      book-postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: book-postgres
  ports:
    - name:       postgres
      port:       5432
      targetPort: postgres
      protocol:   TCP