# PostgreSQL credentials for book-service database.
#
# ⚠️  DO NOT commit real values to git.
#     Values below are base64-encoded PLACEHOLDERS.
#
# Create imperatively (recommended):
#   kubectl create secret generic book-postgres-secret \
#     --namespace book-postgres \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD=yourStrongPassword \
#     --from-literal=POSTGRES_DB=book_db

apiVersion: v1
kind: Secret
metadata:
  name: book-postgres-secret
  namespace: book-postgres
  labels:
    app.kubernetes.io/name:      book-postgres
    app.kubernetes.io/component: secret
type: Opaque
data:
  # echo -n "postgres" | base64
  POSTGRES_USER: cG9zdGdyZXM=

  # echo -n "yourStrongPassword" | base64
  POSTGRES_PASSWORD: eW91clN0cm9uZ1Bhc3N3b3Jk

  # echo -n "book_db" | base64
  POSTGRES_DB: Ym9va19kYg==